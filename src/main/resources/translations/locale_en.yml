 gifts:
  no-heads: Warning! No heads loaded. Presents cannot spawn without a box head.
  load-item-failed: 'Failed to load gift item: {item}'
  no-gifts: Warning! No gifts loaded. No X-Mas without gifts.
  deserialize-item-failed: 'Failed to deserialize gift item: {item}'
  serialize-list-item-failed: 'Failed to serialize item for saving to the gift list. Item: {item}'
  serialize-item-failed: 'Failed to serialize item: {error}'
