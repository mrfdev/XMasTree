# XMas Tree translations
# File: plugins/X-Mas/translations/locale_en.yml
#
# This file is the primary source of truth for:
# - player-facing text
# - admin command/debug wording
# - the chat/console prefix
# - the MiniMessage pastel theme aliases
#
# The plugin loads this file by default when core.locale is set to en.
# Custom locales can be added as:
# - plugins/X-Mas/translations/locale_fr.yml
# - plugins/X-Mas/translations/locale_de.yml
# and so on.

plugin-name: XMas Tree

theme:
 text: '#f7f1e8'
 muted: '#c7c0bb'
 accent: '#9fe3d6'
 accent-secondary: '#f4c2d7'
 label: '#f3d38f'
 success: '#b9e8b5'
 warning: '#f6d58b'
 error: '#f3a7a7'
 info: '#a9d4ff'
 command: '#f4c2d7'

format:
 prefix: '<xm-accent-2>[</xm-accent-2><xm-accent>{plugin_name}</xm-accent><xm-accent-2>]</xm-accent-2> <reset>'
 console-prefix: '<xm-accent-2>[</xm-accent-2><xm-accent>{plugin_name}</xm-accent><xm-accent-2>]</xm-accent-2> <xm-muted>'

messages:
 plugin-enabled: <xm-success>Merry Christmas and Happy New Year!</xm-success>
 timeout: <xm-warning>The holidays are over. See you next year!</xm-warning>
 final-wish: <xm-accent>Happy New Year to all of you, my friends!</xm-accent>

 tree:
  grow-lvl-ready: <xm-success>Woosh!</xm-success> <xm-text>Right-click the tree to let it grow.</xm-text>
  grow-lvl-progress: _UNUSED
  grow-req-list-title: Still needed
  grow-req-list-hint: <xm-muted>Right-click the tree while holding the listed ingredient items to feed them into the tree.</xm-muted>
  grow-not-enough-place: <xm-warning>There is not enough room for the tree to grow.</xm-warning>
  grow-lvl-max: <xm-warning>This tree has reached its maximum level.</xm-warning>
  tree-limit: <xm-warning>Hey, do not be greedy. You have reached your tree limit.</xm-warning>
  destroy-sapling: You can cut down this tree.
  destroy-leaves-santa: Santa Claus sees everything.
  destroy-leaves-tut: To destroy a tree, cut the log.
  destroy-warning: You can cut down the tree. Hit it again to confirm.
  destroy-resource-back: Your used upgrade items will be returned for collection.
  destroy-tut: Hit it again to confirm.
  destroy-fail-owner: <xm-error>It is not your tree.</xm-error>
  destroy-complete: Your tree has been packed away for the season.
  refund:
   chest: Your tree resources were returned in a chest.
   barrel: Your tree resources were returned in a barrel.
   inventory: Your tree resources were returned to your inventory.
   inventory-overflow: Your tree resources were returned. Inventory overflow dropped at the tree.

 gift:
  luck-message: _UNUSED
  unluck-message: <xm-muted>Probably Santa has put you on the blacklist. Better luck next time.</xm-muted>

crystal:
 name: <xm-accent>Christmas Crystal</xm-accent>
 lore:
  - <xm-label>Concentrated Christmas Spirit</xm-label>
  - <xm-muted>Use it on a spruce sapling to fill it with magic.</xm-muted>

command:
 help:
  - '<xm-text>Use </xm-text><xm-command>/xmastree</xm-command><xm-text> to show plugin version and status.</xm-text>'
  - '<xm-text>Use </xm-text><xm-command>/xmastree help</xm-command><xm-text> to show this command list.</xm-text>'
  - '<xm-text>Use </xm-text><xm-command>/xmastree give \<player\></xm-command><xm-text> to give a player a Christmas Crystal.</xm-text>'
  - '<xm-text>Use </xm-text><xm-command>/xmastree gifts</xm-command><xm-text> to spawn presents under all trees.</xm-text>'
  - '<xm-text>Use </xm-text><xm-command>/xmastree gifts list [page]</xm-command><xm-text> to list configured gift rewards.</xm-text>'
  - '<xm-text>Use </xm-text><xm-command>/xmastree gifts roll</xm-command><xm-text> to preview one random gift roll.</xm-text>'
  - '<xm-text>Use </xm-text><xm-command>/xmastree gifts remove \<index\></xm-command><xm-text> to remove a configured gift reward.</xm-text>'
  - '<xm-text>Use </xm-text><xm-command>/xmastree addhand</xm-command><xm-text> to add your held item as a gift.</xm-text>'
  - '<xm-text>Use </xm-text><xm-command>/xmastree reload</xm-command><xm-text> to reload config, translations, theme, and crystal item text.</xm-text>'
  - '<xm-text>Use </xm-text><xm-command>/xmastree inspect</xm-command><xm-text> to inspect the tree you are looking at.</xm-text>'
  - '<xm-text>Use </xm-text><xm-command>/xmastree test sound first|repeat [player]</xm-command><xm-text> to preview grow sound volume.</xm-text>'
  - '<xm-text>Use </xm-text><xm-command>/xmastree test particle \<level\> [effect] [player]</xm-command><xm-text> to preview configured particles.</xm-text>'
  - '<xm-text>Use </xm-text><xm-command>/xmastree data backup</xm-command><xm-text> to back up trees.yml.</xm-text>'
  - '<xm-text>Use </xm-text><xm-command>/xmastree data validate</xm-command><xm-text> to check saved tree data.</xm-text>'
  - '<xm-text>Use </xm-text><xm-command>/xmastree data migrate-world \<from\> \<to\> [dry-run|apply]</xm-command><xm-text> to migrate saved tree world names.</xm-text>'
  - '<xm-text>Use </xm-text><xm-command>/xmastree debug</xm-command><xm-text> to open the status debug section.</xm-text>'
  - '<xm-text>Use </xm-text><xm-command>/xmastree debug status</xm-command><xm-text> and other categories for status, commands, permissions, placeholders, and toggles.</xm-text>'
  - '<xm-text>Use </xm-text><xm-command>/xmastree debug toggle \<key\> true|false</xm-command><xm-text> to change supported global toggles.</xm-text>'
  - '<xm-text>Use </xm-text><xm-command>/xmastree end</xm-command><xm-text> to end the event.</xm-text>'
 player-offline: '<xm-error>Player not found.</xm-error>'
 no-player-name: '<xm-warning>Missing player name.</xm-warning>'
 giveaway: '<xm-accent-2>Ho!</xm-accent-2> <xm-accent>Ho!</xm-accent> <xm-label>Ho!</xm-label> <xm-info>Looks like it is time to check presents.</xm-info>'
 no-permission: '<xm-error>You do not have permission to use this command.</xm-error>'
 player-only: '<xm-error>Only players can use this command.</xm-error>'
 hold-item-first: '<xm-error>Hold an item before running {command}.</xm-error>'
 gift-added: '<xm-success>Added the held item to the gift list.</xm-success>'
 reload-success: '<xm-success>{plugin_name} configuration reloaded.</xm-success>'
 inspect:
  not-found: '<xm-warning>No XMas Tree found nearby or in your line of sight.</xm-warning>'
 test:
  no-particles: '<xm-warning>No enabled particle effects matched that preview.</xm-warning>'
 data:
  backup-created: '<xm-success>Tree data backup created.</xm-success>'
  backup-failed: '<xm-error>Unable to back up trees.yml.</xm-error>'
  migration-applied: '<xm-warning>World migration saved. Restart the server before testing migrated trees.</xm-warning>'
  migration-failed: '<xm-error>Unable to migrate tree world names.</xm-error>'
 legacy-alias-enabled: '<xm-muted>Legacy alias: </xm-muted><xm-command>/xmas</xm-command><xm-muted> still works.</xm-muted>'

ui:
 status:
  title: '<xm-accent><bold>{plugin_name}</bold></xm-accent> <xm-text>{version}</xm-text> <xm-accent><bold>Plugin Status</bold></xm-accent>'
  labels:
   event-status: Event Status
   current-time: Current Time
   holidays-end: Holidays End
   auto-end: Auto-End
   resource-back: Resource Back
   particles: Particles
   loaded-trees: Loaded Trees
   tree-owners: Tree Owners
   help: Help
   legacy-alias: Legacy Alias
  values:
   in-progress: '<xm-success>In Progress</xm-success>'
   holidays-end: '<xm-error>Holidays End</xm-error>'

 command-descriptions:
  status: status
  help: command list
  give: give a Christmas Crystal
  gifts: spawn presents under all trees
  gifts-list: list configured gifts
  gifts-roll: preview a random gift roll
  gifts-remove: remove a configured gift
  addhand: add held item to gifts
  reload: reload config and translations
  inspect: inspect the tree you are looking at
  test-sound: preview grow sounds
  test-particle: preview configured particles
  data-backup: back up trees.yml
  data-validate: validate trees.yml
  data-migrate-world: migrate saved tree world names
  end: end the event
  debug: open the status debug section
  debug-section: extended debug output by category
  debug-toggle: toggle global booleans

 permission-descriptions:
  admin: allows all {plugin_name} commands and overrides
  status: shows /xmastree status output
  help: shows /xmastree help output
  give: allows /xmastree give
  gifts: allows /xmastree gifts
  addhand: allows /xmastree addhand
  reload: allows /xmastree reload
  inspect: allows /xmastree inspect
  test: allows /xmastree test
  data: allows /xmastree data
  debug: allows /xmastree debug
  debug-toggle: allows /xmastree debug toggle
  end: allows /xmastree end
  tree-override: allows managing other players' trees

 debug:
  section-title: '<xm-accent><bold>{plugin_name} Debug</bold></xm-accent>'
  sections:
   status: Status
   commands: Commands
   permissions: Permissions
   placeholders: Placeholders
   config: Config
  labels:
   usage: Usage
   keys: Keys
   unknown-toggle-key: Unknown Toggle Key
   value: Value
   updated: Updated
   next: Next
   sections: Debug Sections
   pages: Debug Pages
   requested: Requested
   try: Try
   notes: Notes
  invalid-boolean: '<xm-error>must be true or false</xm-error>'
  notes:
   placeholders: '<xm-text>Requires PlaceholderAPI. Use ''_'' after prefix, then dotted keys.</xm-text>'
  placeholder-default-description: registered placeholder

 inspect:
  title: '<xm-accent><bold>{plugin_name} Tree Inspect</bold></xm-accent>'
  labels:
   owner: Owner
   tree-id: Tree ID
   level: Level
   location: Location
   can-level-up: Can Level Up
   present-timer: Present Timer
   scheduled-presents: Scheduled Presents
   remaining: Remaining Requirements
   refund-preview: Refund Preview
   requested: Requested
   try: Try
   usage: Usage
  values:
   none: none
   unknown-owner: unknown
   unknown-location: unknown

 reload:
  title: Reload Summary
  labels:
   locale: Locale
   gifts: Gifts
   present-heads: Present Heads
   trees: Trees
   owners: Owners
   particles: Particles
   resource-back: Resource Back
   legacy-alias: Legacy Alias
   sounds: Sounds

 test:
  labels:
   usage: Usage
   unknown-test: Unknown Test
   try: Try
   sound: Sound
   particle: Particle
   target: Target
   volume: Volume
   level: Level
   levels: Levels
   effects-played: Effects Played

 gifts:
  title: Gift Pool
  labels:
   usage: Usage
   unknown-action: Unknown Gift Action
   total: Total
   rolled: Rolled
   removed: Removed
   index: Index
   try: Try
  values:
   empty: '<xm-warning>No gifts are configured.</xm-warning>'

 data:
  title: Tree Data Validation
  world-migration-title: Tree World Migration
  labels:
   usage: Usage
   unknown-action: Unknown Data Action
   try: Try
   file: File
   error: Error
   stored-trees: Stored Trees
   loaded-trees: Loaded Trees
   status: Status
   invalid-tree-ids: Invalid Tree IDs
   invalid-owners: Invalid Owners
   invalid-levels: Invalid Levels
   invalid-locations: Invalid Locations
   missing-worlds: Missing Worlds
   invalid-requirements: Invalid Requirements
   duplicate-locations: Duplicate Locations
   source-world: Source World
   target-world: Target World
   matched-trees: Matched Trees
   mode: Mode
   backup: Backup
   apply-command: Apply Command
  values:
   clean: '<xm-success>clean</xm-success>'
   warnings: '<xm-warning>warnings</xm-warning>'

placeholders:
 values:
  active: Active
  inactive: Inactive
  in-progress: In Progress
  holidays-end: Holidays End
  manual: manual
  yes: Yes
  no: No
  unknown: unknown
  disabled: disabled
  ended: ended
  duration-days-hours: '{days}d {hours}h'
  duration-hours-minutes: '{hours}h {minutes}m'
  duration-minutes: '{minutes}m'
 descriptions:
  event-active: whether the event is currently active
  event-active-text: human-readable active state
  event-status: current event status text
  event-starts-at: event start mode
  event-ends-at: configured event end date
  event-ends-in: time remaining until the event ends
  event-ends-timestamp: event end timestamp in milliseconds
  event-auto-end: whether automatic ending is enabled
  resource-back: whether resource refunds are enabled
  resource-back-text: human-readable refund state
  particles-enabled: whether XMas Tree particles are enabled
  luck-enabled: whether gift luck chance is enabled
  luck-chance: gift luck chance as a percent
  trees-total: total loaded tree count
  trees-owners: number of unique tree owners
  player-trees: loaded trees owned by the placeholder player
  version: loaded plugin version

console:
 translation:
  loaded: Loaded translation '{file}'.
  missing: Translation '{file}' was not found.
  fallback: Falling back to locale_en.yml.
  create-directory-failed: Unable to create translations directory at {directory}
  migrated-legacy: Migrated legacy locale '{source}' to '{target}'.
  migrate-legacy-failed: 'Unable to migrate legacy locale ''{source}'' to ''{target}'': {error}'
 config:
  update-speed-invalid: Update speed must be > 0
  update-speed-reset: Setting value to default
  unable-load-holiday-end-date: Unable to load holiday end date
  invalid-holiday-end-date: Invalid holiday end date in config.yml
  load-yaml-failed: Failed to load YAML configuration from {file}
  create-directory-failed: Unable to create configuration directory {directory}
  save-yaml-failed: Failed to save YAML configuration to {file}
