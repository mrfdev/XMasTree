  unable-save: Unable to save X-Mas tree data
  unable-remove: Unable to remove X-Mas tree data
  material-missing: Cannot find modern material '{material}' for tree level.
  material-numeric-required: Tree level material '{material}' must use a numeric amount.
  material-load-failed: Cannot load material '{material}' for tree level.
  world-alias: Loading legacy X-Mas trees from saved world '{source}' into '{target}' via migration.world-aliases.
 alias:
  command-map-unavailable: Unable to access the Bukkit command map. Skipping legacy /xmas alias registration.
  owned-by-plugin: Legacy alias '/{alias}' is already owned by plugin '{plugin}'. Skipping alias registration.
  registered-by-other: Legacy alias '/{alias}' is already registered by another command source. Skipping alias registration.
  create-failed: Unable to create the legacy /xmas alias command.
  registered: Registered legacy alias '/{alias}' for '/{primary}'.
