     count: 16
    body:
     # Enables the trunk/body particle effect for magic trees.
     # Default: false
     # Safe values: true or false
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     enabled: false

   # Max-level trees have no next-stage ingredient requirements.
   # Default: empty section
   # Safe values: leave empty
   # Reload behavior: informational only; no practical effect unless custom code starts reading it later.
   lvlup: {}

migration:
 # Maps world names from legacy trees.yml data to current world names.
 # Default: empty map
 # Safe format:
 #   old_world_name: new_world_name
 # Example:
 #   general: world
 #   wild: world
 #   santa: santa_event
 # Reload behavior:
 # - File edits are saved immediately when the file is written.
 # - A full server restart or world reload is recommended before expecting already-saved trees to load using new aliases.
 world-aliases: {}
