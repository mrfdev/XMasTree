     # Default: 0.35
     # Safe values: decimal numbers, usually 0.0 or higher
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     offset-z: 0.35
     # Particle speed value passed to the Paper particle API.
     # Default: 0.0
     # Safe values: decimal numbers, usually 0.0 or higher
