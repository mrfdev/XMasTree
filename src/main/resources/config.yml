     particle: SNOWFLAKE
     # Horizontal X offset for the full tree ambient particle spread.
     # Default: 1.5
     # Safe values: decimal numbers, usually 0.0 or higher
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     offset-x: 1.5
     # Vertical Y offset for the full tree ambient particle spread.
     # Default: 3.0
     # Safe values: decimal numbers, usually 0.0 or higher
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     offset-y: 3.0
     # Horizontal Z offset for the full tree ambient particle spread.
     # Default: 1.5
     # Safe values: decimal numbers, usually 0.0 or higher
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     offset-z: 1.5
     # Particle speed value passed to the Paper particle API.
     # Default: 0.0
     # Safe values: decimal numbers, usually 0.0 or higher
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     speed: 0.0
     # Number of ambient particles spawned per effect tick.
     # Default: 8
     # Safe values: whole numbers 0 or higher
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     count: 8
    swag:
     # Enables the ornament-style particle effect for full trees.
     # Default: true
     # Safe values: true or false
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     enabled: true
     # Particle type for the full tree ornament effect.
     # Default: FIREFLY
     # Safe values: a valid Particle enum name
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     particle: FIREFLY
     # Horizontal X offset for the full tree ornament particle spread.
     # Default: 0.35
     # Safe values: decimal numbers, usually 0.0 or higher
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     offset-x: 0.35
     # Vertical Y offset for the full tree ornament particle spread.
     # Default: 0.35
     # Safe values: decimal numbers, usually 0.0 or higher
