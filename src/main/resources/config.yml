# XMas Tree main configuration
# File: plugins/X-Mas/config.yml
#
# General config behavior:
# - Existing values are preserved when the plugin adds new defaults.
# - /xmastree reload re-reads this file without a full server restart unless noted otherwise below.
# - /xmastree debug toggle <key> true|false can live-toggle a few global booleans and then reload the config.
# - Comments from this bundled template are merged into missing comment slots when the plugin loads the config.

core:
 # Master switch for the XMas Tree event.
 # Default: true
 # Safe values: true or false
 # Reload behavior:
 # - File edits apply on /xmastree reload.
 # - /xmastree debug toggle core.plugin-enabled true|false applies immediately.
 # - Turning the event off is immediate.
 # - Turning it back on after the plugin has already ended the event is safest with a full server restart.
 plugin-enabled: true

 # Locale file name loaded from plugins/X-Mas/locales/<locale>.yml.
 # Default: en
 # Safe values: a locale file name without .yml, for example en, ru, or ru_santa
 # Reload behavior: /xmastree reload applies immediately.
 locale: en

 # Maximum number of XMas trees one player may own at the same time.
 # Default: 3
 # Safe values: 1 or higher
 # Reload behavior: /xmastree reload applies immediately for future placement checks.
 tree-limit: 3

 commands:
  # Registers the legacy /xmas alias alongside the primary /xmastree command.
  # Default: true
  # Safe values: true or false
  # Reload behavior:
  # - File edits apply on /xmastree reload.
  # - /xmastree debug toggle core.commands.legacy-command-enabled true|false applies immediately.
  legacy-command-enabled: true

 # Automatic end-of-event behavior.
 holiday-ends:
  # Enables time-based event shutdown.
  # Default: true
  # Safe values: true or false
  # Reload behavior:
  # - File edits apply on /xmastree reload.
  # - /xmastree debug toggle core.holiday-ends.enabled true|false applies immediately.
  enabled: true

  # Date/time when the event should end automatically.
  # Default: 10-01-2027 03-33-33
  # Required format: dd-MM-yyyy HH-mm-ss
  # Example: 24-12-2026 18-00-00
  # Reload behavior: /xmastree reload applies immediately.
  date: 10-01-2027 03-33-33

  # Returns spent tree-upgrade materials when a tree is destroyed or cleaned up after the event.
  # Default: true
  # Safe values: true or false
  # Refund order: chest -> barrel -> player inventory -> floor drops
  # Reload behavior:
  # - File edits apply on /xmastree reload.
  # - /xmastree debug toggle core.holiday-ends.resource-back true|false applies immediately.
  resource-back: true

 # Interval for the main tree update task.
 # Default: 7
 # Units: server ticks (20 ticks = about 1 second)
 # Safe values: any whole number greater than 0
 # Notes:
 # - This value is also used when scaling stage gift cooldowns into task ticks.
 # - Smaller values make the plugin check trees more often.
 # Reload behavior:
 # - /xmastree reload re-reads the value.
 # - A full server restart is recommended to recreate the scheduled task with the new cadence.
 update-speed: 7

 # Interval for the particle task.
 # Default: 35
 # Units: server ticks
 # Safe values: any whole number greater than 0
 # Notes:
 # - Smaller values make particle updates happen more often and can look noisier.
 # Reload behavior:
 # - /xmastree reload re-reads the value.
 # - A full server restart is recommended to recreate the scheduled task with the new cadence.
 particles-delay: 35

 # Global particle master switch for tree visual effects.
 # Default: true
 # Safe values: true or false
 # Reload behavior:
 # - File edits apply on /xmastree reload.
 # - /xmastree debug toggle core.particles-enabled true|false applies immediately.
 particles-enabled: true

 sounds:
  grow:
   # Volume for the first accepted item of a material requirement.
   # Default: 0.5
   # Safe values: decimal numbers from 0.0 to 1.0
   # Examples: 0.0 = silent, 0.1 = quiet, 0.5 = half volume, 1.0 = full volume
   # Reload behavior: /xmastree reload applies immediately.
   first-volume: 0.5

   # Volume for repeated accepted items of the same material requirement.
   # Default: 0.2
   # Safe values: decimal numbers from 0.0 to 1.0
   # Example: the first redstone dust uses first-volume, later redstone dust uses repeat-volume
   # Reload behavior: /xmastree reload applies immediately.
   repeat-volume: 0.2

xmas:
 luck:
  # Enables the optional luck check for presents.
  # Default: false
  # Safe values: true or false
  # Notes:
  # - When disabled, presents always use the main gift pool.
  # - When enabled, the configured luck chance decides whether the normal gift is used.
  # Reload behavior:
  # - File edits apply on /xmastree reload.
  # - /xmastree debug toggle xmas.luck.enabled true|false applies immediately.
  enabled: false

  # Success chance for the present luck system.
  # Default: 75
  # Safe values: whole numbers from 1 to 100
  # Notes:
  # - The plugin currently reads this as a percentage and divides by 100 internally.
  # - Values outside the normal 1-100 range are not recommended.
  # Reload behavior: /xmastree reload applies immediately.
  chance: 75

 # Present head skins used for spawned gifts under trees.
 # Default: the two textures.minecraft.net URLs below
 # Safe values:
 # - preferred: textures.minecraft.net URLs
 # - legacy compatibility: old player-name entries still load
 # Security note: modern URL entries are restricted to textures.minecraft.net
 # Reload behavior: /xmastree reload applies immediately for newly spawned presents.
 presents:
  - http://textures.minecraft.net/texture/21bc9d42b0041e8f95cb9b26628fdaf50cd0e36f7bb9d6b3a4d2af3949da97d6
  - http://textures.minecraft.net/texture/2b1ec7dc753061ca174424ea45cf9490b39cd5dcca477d138a603e6be755ec72

 # Gift pool for presents.
 # Default: the material list below
 # Safe values:
 # - MATERIAL
 # - MATERIAL:AMOUNT
 # - Base64 item strings saved by /xmastree addhand
 # Notes:
 # - Use modern Paper/Bukkit material names only.
 # - Invalid or legacy material names are skipped safely.
 # - /xmastree addhand appends the exact held item and saves it immediately.
 # Reload behavior:
 # - File edits apply on /xmastree reload.
 # - /xmastree addhand applies immediately and persists to disk.
 gifts:
  - DIAMOND
  - EMERALD
  - IRON_SWORD
  - IRON_HELMET
  - IRON_CHESTPLATE
  - IRON_BOOTS
  - CAKE
  - COOKIE
  - BLAZE_ROD
  - DIAMOND_SWORD
  - IRON_INGOT
  - GOLD_INGOT
  - SPONGE
  - DIAMOND_HOE
  - NAME_TAG

 # Tree stage settings.
 # Notes:
 # - gift-cooldown values are written in seconds and converted using core.update-speed.
 # - lvlup sections use modern material names and item counts for the next stage.
 # - Particle names should come from the Paper Particle enum:
 #   https://jd.papermc.io/paper/26.1.2/org/bukkit/Particle.html
 # - Existing loaded trees may keep their current stage objects until the next full restart.
 #   /xmastree reload is best for new trees and newly loaded trees, while a restart is recommended
 #   when you want every existing tree to use the refreshed stage settings.
 tree-lvl:
  sapling:
   # Delay before present spawns at the sapling stage.
   # Default: -1
   # Units: seconds before scaling by core.update-speed
   # Safe values: -1 to disable present spawning, or 0 and higher
   # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
   gift-cooldown: -1

   particles:
    ambient:
     # Enables the ambient particle effect for saplings.
     # Default: true
     # Safe values: true or false
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     enabled: true
     # Particle type for the sapling ambient effect.
     # Default: SPORE_BLOSSOM_AIR
     # Safe values: a valid Particle enum name
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     particle: SPORE_BLOSSOM_AIR
     # Horizontal X offset for the sapling ambient particle spread.
     # Default: 0.35
     # Safe values: decimal numbers, usually 0.0 or higher
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     offset-x: 0.35
     # Vertical Y offset for the sapling ambient particle spread.
     # Default: 0.45
     # Safe values: decimal numbers, usually 0.0 or higher
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     offset-y: 0.45
     # Horizontal Z offset for the sapling ambient particle spread.
     # Default: 0.35
     # Safe values: decimal numbers, usually 0.0 or higher
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     offset-z: 0.35
     # Particle speed value passed to the Paper particle API.
     # Default: 0.01
     # Safe values: decimal numbers, usually 0.0 or higher
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     speed: 0.01
     # Number of ambient particles spawned per effect tick.
     # Default: 2
     # Safe values: whole numbers 0 or higher
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     count: 2
    swag:
     # Enables the ornament-style particle effect for saplings.
     # Default: false
     # Safe values: true or false
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     enabled: false
    body:
     # Enables the trunk/body particle effect for saplings.
     # Default: false
     # Safe values: true or false
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     enabled: false

   lvlup:
    # Diamonds required to grow from sapling to small_tree.
    # Default: 1
    # Safe values: whole numbers 1 or higher
    # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
    DIAMOND: 1
    # Redstone dust required to grow from sapling to small_tree.
    # Default: 10
    # Safe values: whole numbers 1 or higher
    # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
    REDSTONE: 10
    # Ender pearls required to grow from sapling to small_tree.
    # Default: 1
    # Safe values: whole numbers 1 or higher
    # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
    ENDER_PEARL: 1

  small_tree:
   # Delay before present spawns at the small_tree stage.
   # Default: 300
   # Units: seconds before scaling by core.update-speed
   # Safe values: 0 or higher
   # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
   gift-cooldown: 300

   particles:
    ambient:
     # Enables the ambient particle effect for small trees.
     # Default: true
     # Safe values: true or false
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     enabled: true
     # Particle type for the small tree ambient effect.
     # Default: CHERRY_LEAVES
     # Safe values: a valid Particle enum name
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     particle: CHERRY_LEAVES
     # Horizontal X offset for the small tree ambient particle spread.
     # Default: 1.0
     # Safe values: decimal numbers, usually 0.0 or higher
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     offset-x: 1.0
     # Vertical Y offset for the small tree ambient particle spread.
     # Default: 1.5
     # Safe values: decimal numbers, usually 0.0 or higher
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     offset-y: 1.5
     # Horizontal Z offset for the small tree ambient particle spread.
     # Default: 1.0
     # Safe values: decimal numbers, usually 0.0 or higher
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     offset-z: 1.0
     # Particle speed value passed to the Paper particle API.
     # Default: 0.01
     # Safe values: decimal numbers, usually 0.0 or higher
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     speed: 0.01
     # Number of ambient particles spawned per effect tick.
     # Default: 3
     # Safe values: whole numbers 0 or higher
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     count: 3
    swag:
     # Enables the ornament-style particle effect for small trees.
     # Default: true
     # Safe values: true or false
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     enabled: true
     # Particle type for the small tree ornament effect.
     # Default: DUST
     # Safe values: a valid Particle enum name supported by the plugin's simple particle loader
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     particle: DUST
     # Horizontal X offset for the small tree ornament particle spread.
     # Default: 0.25
     # Safe values: decimal numbers, usually 0.0 or higher
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     offset-x: 0.25
     # Vertical Y offset for the small tree ornament particle spread.
     # Default: 0.25
     # Safe values: decimal numbers, usually 0.0 or higher
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     offset-y: 0.25
     # Horizontal Z offset for the small tree ornament particle spread.
     # Default: 0.25
     # Safe values: decimal numbers, usually 0.0 or higher
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     offset-z: 0.25
     # Particle speed value passed to the Paper particle API.
     # Default: 0.0
     # Safe values: decimal numbers, usually 0.0 or higher
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     speed: 0.0
     # Number of ornament particles spawned per effect tick.
     # Default: 8
     # Safe values: whole numbers 0 or higher
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     count: 8
    body:
     # Enables the trunk/body particle effect for small trees.
     # Default: false
     # Safe values: true or false
     # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
     enabled: false

   lvlup:
    # Diamonds required to grow from small_tree to tree.
    # Default: 3
    # Safe values: whole numbers 1 or higher
    # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
    DIAMOND: 3
    # Gold ingots required to grow from small_tree to tree.
    # Default: 5
    # Safe values: whole numbers 1 or higher
    # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
    GOLD_INGOT: 5
    # Blaze powder required to grow from small_tree to tree.
    # Default: 10
    # Safe values: whole numbers 1 or higher
    # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
    BLAZE_POWDER: 10
    # Snowballs required to grow from small_tree to tree.
    # Default: 30
    # Safe values: whole numbers 1 or higher
    # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
    SNOWBALL: 30

  tree:
   # Delay before present spawns at the tree stage.
   # Default: 180
   # Units: seconds before scaling by core.update-speed
   # Safe values: 0 or higher
   # Reload behavior: /xmastree reload for new trees; restart recommended for fully consistent existing-tree behavior.
   gift-cooldown: 180

