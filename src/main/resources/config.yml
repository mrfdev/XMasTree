core:
 # Master switch for the event. When false, players can no longer create or grow trees.
 plugin-enabled: true

 # Locale file to load from plugins/X-Mas/locales/<locale>.yml.
 locale: en

 # Maximum number of magic Christmas trees a single player can own.
 tree-limit: 3

 commands:
  # Primary admin command is /xmastree.
  # When true, the legacy /xmas alias is also registered.
  # /xmastree reload applies changes without a server restart.
  legacy-command-enabled: true

 # Automatic end-of-event behavior.
 holiday-ends:
  # When true, the plugin will switch plugin-enabled to false after the date below.
  enabled: true

  # Date/time when the event ends. Format: dd-MM-yyyy HH-mm-ss.
  date: 10-01-2027 03-33-33

  # When true, destroyed or ended trees return spent upgrade resources.
  # The plugin tries a chest first, then a barrel, then the player's inventory, then floor drops.
  resource-back: true

 # Main tree update interval in ticks. 20 ticks is roughly 1 second.
 # Gift cooldown values are scaled by this value. Must be greater than 0.
 update-speed: 7

 # Particle update interval in ticks. Keep this higher if particles become noisy.
 particles-delay: 35

 # Global particle switch. Can be toggled with /xmastree debug toggle core.particles-enabled true|false.
 particles-enabled: true

 sounds:
  grow:
   # Volume for the first accepted item of each material requirement.
   # Use 0.0 for silent, 0.1 for quiet, 0.5 for half volume, and 1.0 for full volume.
   first-volume: 0.5

   # Volume for repeated accepted items of the same material requirement.
   # Example: first redstone dust uses first-volume, later redstone dust uses repeat-volume.
   repeat-volume: 0.2

xmas:
 luck:
  # When true, gift openings can fail and drop the fallback item instead.
  enabled: false

  # Success chance from 1-100 when luck is enabled.
  chance: 75

 # Present head skins. Prefer official MineSkin/Mojang texture URLs.
 # For safety, texture URLs must use textures.minecraft.net. Old player-name entries still work.
 presents:
  - http://textures.minecraft.net/texture/21bc9d42b0041e8f95cb9b26628fdaf50cd0e36f7bb9d6b3a4d2af3949da97d6
  - http://textures.minecraft.net/texture/2b1ec7dc753061ca174424ea45cf9490b39cd5dcca477d138a603e6be755ec72

 # Gift list for presents. Use modern Paper/Bukkit material names, optionally MATERIAL:AMOUNT.
 # Admins can also run /xmastree addhand to save the exact held item as a Base64 entry.
 gifts:
  - DIAMOND
  - EMERALD
  - IRON_SWORD
  - IRON_HELMET
  - IRON_CHESTPLATE
  - IRON_BOOTS
  - CAKE
  - COOKIE
  - BLAZE_ROD
  - DIAMOND_SWORD
  - IRON_INGOT
  - GOLD_INGOT
  - SPONGE
  - DIAMOND_HOE
  - NAME_TAG

 # Tree levels. gift-cooldown is in seconds before scaling by core.update-speed.
 # lvlup sections define the modern material names and counts needed for the next level.
 # Particle enum reference for Paper 26.1.2:
 # https://jd.papermc.io/paper/26.1.2/org/bukkit/Particle.html
 # Configured particles currently support simple particles and DUST.
 tree-lvl:
  sapling:
   # -1 disables present spawning for this level.
   gift-cooldown: -1
   # Visual effects for this stage. Set enabled: false to disable an effect slot.
   particles:
    ambient:
     enabled: true
     particle: SPORE_BLOSSOM_AIR
     offset-x: 0.35
     offset-y: 0.45
     offset-z: 0.35
     speed: 0.01
     count: 2
    swag:
     enabled: false
    body:
     enabled: false
   # Materials required to grow from sapling to small_tree.
   lvlup:
    DIAMOND: 1
    REDSTONE: 10
    ENDER_PEARL: 1
  small_tree:
   # Seconds between present spawn attempts for small trees.
   gift-cooldown: 300
   # Small trees get a little more ambient motion and light ornament sparkle.
   particles:
    ambient:
     enabled: true
     particle: CHERRY_LEAVES
     offset-x: 1.0
     offset-y: 1.5
     offset-z: 1.0
     speed: 0.01
     count: 3
    swag:
     enabled: true
     particle: DUST
     offset-x: 0.25
     offset-y: 0.25
     offset-z: 0.25
     speed: 0.0
     count: 8
    body:
     enabled: false
   # Materials required to grow from small_tree to tree.
   lvlup:
    DIAMOND: 3
    GOLD_INGOT: 5
    BLAZE_POWDER: 10
    SNOWBALL: 30
  tree:
   # Seconds between present spawn attempts for full trees.
   gift-cooldown: 180
   # Full trees are more visible, with snow and firefly sparkle.
   particles:
    ambient:
     enabled: true
     particle: SNOWFLAKE
     offset-x: 1.5
     offset-y: 3.0
     offset-z: 1.5
     speed: 0.0
     count: 8
    swag:
     enabled: true
     particle: FIREFLY
     offset-x: 0.35
     offset-y: 0.35
     offset-z: 0.35
     speed: 0.0
     count: 4
    body:
     enabled: false
   # Materials required to grow from tree to magic_tree.
   lvlup:
    DIAMOND: 5
    EMERALD: 3
    GOLD_NUGGET: 8
    GLOWSTONE_DUST: 16
  magic_tree:
   # Seconds between present spawn attempts for max-level magic trees.
   gift-cooldown: 120
   # Magic trees use the strongest ambient set.
   particles:
    ambient:
     enabled: true
     particle: FIREFLY
     offset-x: 2.25
     offset-y: 2.25
     offset-z: 2.25
     speed: 0.0
     count: 8
    swag:
     enabled: true
     particle: DUST
     offset-x: 0.3
     offset-y: 0.3
     offset-z: 0.3
     speed: 10.0
     count: 16
    body:
     enabled: false
  # Max-level trees have no next-level requirements.
  lvlup:

migration:
 # Map saved world names from legacy trees.yml data to the current server world names.
 # This keeps old player trees loadable even when the destination server uses different world names.
 # Example:
 #  world-aliases:
 #   general: world
 #   wild: world
 #   santa: santa_event
 world-aliases: {}
